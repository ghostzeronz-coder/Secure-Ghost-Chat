name: EAS iOS Build & Submit

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

# Required GitHub secrets:
#   EXPO_TOKEN       — Expo access token (used for every step)
#   APPLE_ID         — Apple Developer account email
#   APPLE_TEAM_ID    — 10-character Apple Team ID
#   APPLE_ASC_APP_ID — Numeric App Store Connect App ID (required for submit on tagged releases)

jobs:
  build-and-submit:
    name: Build iOS (EAS) and Submit on Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify EAS authentication
        run: eas whoami
        working-directory: artifacts/ghostface
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS production iOS build
        run: eas build --platform ios --profile production --non-interactive
        working-directory: artifacts/ghostface
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store (tagged releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          eas submit --platform ios --profile production --non-interactive
          --apple-id "${{ secrets.APPLE_ID }}"
          --apple-team-id "${{ secrets.APPLE_TEAM_ID }}"
        working-directory: artifacts/ghostface
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ASC_APP_ID: ${{ secrets.APPLE_ASC_APP_ID }}
